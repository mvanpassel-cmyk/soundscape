<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Soundscape</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Soundscape">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#e8e6e1;font-family:monospace;display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 14px;min-height:100vh;}
#wrap{position:relative;width:min(340px,90vw);height:min(340px,90vw);background:#dddbd5;border:1px solid #c5c2bb;}
canvas{display:block;width:100%;height:100%;}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#dddbd5;z-index:10;}
#sb{padding:18px 36px;background:#1a1a1a;color:#e8e6e1;border:none;font-family:monospace;font-size:14px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;}
#ml{position:absolute;top:8px;left:10px;font-size:8px;letter-spacing:2px;color:#bbb;text-transform:uppercase;}
#rb{position:absolute;bottom:10px;right:10px;width:14px;height:14px;border-radius:50%;background:#a02020;border:1px solid #c03030;cursor:pointer;display:none;}
#rt{position:absolute;bottom:10px;right:28px;font-size:8px;color:#bbb;line-height:14px;}
.row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;justify-content:center;}
.col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.col label{font-size:7px;letter-spacing:1px;color:#aaa;text-transform:uppercase;}
input[type=range]{writing-mode:vertical-lr;direction:rtl;width:2px;height:55px;accent-color:#888;cursor:pointer;}
.btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.btn{font-size:8px;letter-spacing:1px;color:#888;text-transform:uppercase;cursor:pointer;padding:6px 10px;border:1px solid #c5c2bb;background:#dddbd5;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ov"><button id="sb">&#9654; start</button></div>
  <div id="ml">generative</div>
  <div id="rb"></div>
  <div id="rt"></div>
</div>
<div id="ui" style="display:none;flex-direction:column;align-items:center;gap:12px;width:min(340px,90vw);">
  <div class="row">
    <div class="col"><input type="range" id="sRev" min="0" max="0.95" step="0.01" value="0.85"><label>reverb</label></div>
    <div class="col"><input type="range" id="sDly" min="0" max="0.9" step="0.01" value="0.4"><label>delay</label></div>
    <div class="col"><input type="range" id="sRate" min="0.1" max="2" step="0.05" value="0.4"><label>rate</label></div>
    <div class="col"><input type="range" id="sVol" min="0" max="1" step="0.01" value="0.65"><label>vol</label></div>
  </div>
  <div class="btns">
    <div class="btn" id="bPlay">stop</div>
    <div class="btn" id="bScale">pentatonic</div>
  </div>
</div>
<script>
var AC = window.AudioContext || window.webkitAudioContext;
var ac, master, rev, revGain, dly, an;
var playing = false, si = 0;
var timers = [];
var C = document.getElementById('c');
var X = C.getContext('2d');
var N = 24, pts = [], en = 0, sm = 0;

for (var i = 0; i < N; i++) {
  pts.push({a:(i/N)*Math.PI*2, r:0.4, v:0, p1:Math.random()*6.28, p2:Math.random()*6.28});
}

// Full scale note pools — low mid and high are genuinely different notes
var SCALES = [
  {n:'pentatonic', low:['C2','G2','E2'], mid:['C3','E3','G3','B3','D3'], high:['G4','B4','D5','E4','A4']},
  {n:'dorian',     low:['D2','A2','F2'], mid:['D3','F3','A3','C4','E3'], high:['D4','F4','A4','C5','E4']},
  {n:'lydian',     low:['F2','C3','A2'], mid:['F3','A3','C4','E4','G3'], high:['F4','A4','C5','E5','G4']},
  {n:'minor pent', low:['A2','E2','C2'], mid:['A3','C4','D3','E3','G3'], high:['A4','C5','D4','G4','E4']},
  {n:'blues',      low:['C2','G2','Eb2'],mid:['C3','Eb3','F3','G3','Bb3'],high:['C4','Eb4','F4','G4','Bb4']},
  {n:'whole tone', low:['C3','D3','E3'], mid:['F3','G#3','A#3','C4'],    high:['D4','E4','F#4','G#4']}
];

function noteHz(note) {
  var m = note.match(/([A-G]#?b?)(d)/);
  if (!m) return 220;
  var ns = {C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
  return 440 * Math.pow(2, (ns[m[1]] + (+m[2]+1)*12 - 69) / 12);
}

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function gp(id) { return parseFloat(document.getElementById(id).value); }

function makeReverb(secs) {
  var len = ac.sampleRate * secs;
  var buf = ac.createBuffer(2, len, ac.sampleRate);
  for (var c = 0; c < 2; c++) {
    var d = buf.getChannelData(c);
    for (var i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.5);
  }
  var conv = ac.createConvolver();
  conv.buffer = buf;
  return conv;
}

function buildGraph() {
  master = ac.createGain();
  master.gain.value = gp('sVol');
  rev = makeReverb(12);
  revGain = ac.createGain();
  revGain.gain.value = gp('sRev');
  dly = ac.createDelay(3);
  dly.delayTime.value = 0.45;
  var dlyFb = ac.createGain();
  dlyFb.gain.value = 0.28;
  dly.connect(dlyFb);
  dlyFb.connect(dly);
  an = ac.createAnalyser();
  an.fftSize = 256;
  master.connect(dly);
  master.connect(rev);
  dly.connect(an);
  rev.connect(revGain);
  revGain.connect(an);
  an.connect(ac.destination);
}

function playNote(freq, dur, vol, type) {
  if (!ac || !playing) return;
  var now = ac.currentTime;
  var atk = 5 + Math.random()*5;
  var rel = 14 + Math.random()*8;
  dur = Math.max(dur, atk + rel + 2);
  var g = ac.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(vol, now + atk);
  g.gain.setValueAtTime(vol, now + dur - rel);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  // 3 detuned oscillators for warmth
  for (var i = 0; i < 3; i++) {
    var o = ac.createOscillator();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.detune.value = (i===0?0:i===1?7:-7) + Math.random()*3-1.5;
    var lfo = ac.createOscillator();
    var lfoG = ac.createGain();
    lfo.frequency.value = 0.06 + Math.random()*0.1;
    lfoG.gain.value = freq * 0.003;
    lfo.connect(lfoG);
    lfoG.connect(o.frequency);
    lfo.start(now);
    lfo.stop(now + dur);
    o.connect(g);
    o.start(now);
    o.stop(now + dur);
  }
  g.connect(master);
}

function schedule() {
  if (!playing) return;
  var sc = SCALES[si];
  var rate = gp('sRate');
  var interval = (3 + (3-rate)*6) * 1000;

  // Drone — mid register note
  playNote(noteHz(rnd(sc.mid)), 20+Math.random()*10, 0.13, 'sine');

  // Shimmer — high register, independent note
  if (Math.random() < 0.7) {
    timers.push(setTimeout(function() {
      if (playing) playNote(noteHz(rnd(sc.high)), 14+Math.random()*8, 0.06, 'sine');
    }, 900 + Math.random()*1200));
  }

  // Sub — low register, independent note
  if (Math.random() < 0.5) {
    timers.push(setTimeout(function() {
      if (playing) playNote(noteHz(rnd(sc.low)), 22+Math.random()*12, 0.11, 'sine');
    }, 1800 + Math.random()*2000));
  }

  // Pad — triangle, mid or high
  if (Math.random() < 0.55) {
    timers.push(setTimeout(function() {
      if (!playing) return;
      var pool = sc.mid.concat(sc.high);
      playNote(noteHz(rnd(pool)), 16+Math.random()*10, 0.07, 'triangle');
    }, Math.random()*3000));
  }

  timers.push(setTimeout(schedule, interval * (0.7 + Math.random()*0.6)));
}

function startGen() {
  timers.forEach(clearTimeout);
  timers = [];
  schedule();
}

function stopGen() {
  timers.forEach(clearTimeout);
  timers = [];
}

function setPlay(v) {
  playing = v;
  document.getElementById('bPlay').textContent = v ? 'stop' : 'play';
  if (v) startGen(); else stopGen();
}

document.getElementById('bPlay').addEventListener('click', function() {
  setPlay(!playing);
});

document.getElementById('bScale').addEventListener('click', function() {
  si = (si + 1) % SCALES.length;
  document.getElementById('bScale').textContent = SCALES[si].n;
});

document.getElementById('sVol').addEventListener('input', function(e) {
  if (master) master.gain.value = +e.target.value;
});
document.getElementById('sRev').addEventListener('input', function(e) {
  if (revGain) revGain.gain.value = +e.target.value;
});
document.getElementById('sRate').addEventListener('input', function() {
  if (playing) { stopGen(); startGen(); }
});

// Record
var recOn = false, recChunks = [], mediaRec = null, recSec = 0, recTmr = null;
document.getElementById('rb').addEventListener('click', function() {
  var rb = document.getElementById('rb'), rt = document.getElementById('rt');
  if (!recOn) {
    var dest = ac.createMediaStreamDestination();
    an.connect(dest);
    recChunks = []; recSec = 0;
    mediaRec = new MediaRecorder(dest.stream);
    mediaRec.ondataavailable = function(e) { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRec.onstop = function() {
      var blob = new Blob(recChunks, {type:'audio/webm'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'soundscape-' + Date.now() + '.webm';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
    mediaRec.start(); recOn = true;
    rb.style.background = '#e03030';
    recTmr = setInterval(function() { recSec++; rt.textContent = recSec + 's'; }, 1000);
  } else {
    clearInterval(recTmr); rt.textContent = '';
    mediaRec.stop(); recOn = false;
    rb.style.background = '#a02020';
  }
});

// iOS-safe start — AudioContext created synchronously in click handler
document.getElementById('sb').addEventListener('click', function() {
  ac = new AC();
  var buf = ac.createBuffer(1, 1, ac.sampleRate);
  var src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(ac.destination);
  src.start(0);
  buildGraph();
  playing = true;
  startGen();
  document.getElementById('ov').style.display = 'none';
  document.getElementById('ui').style.display = 'flex';
  document.getElementById('rb').style.display = 'block';
});

// Blob visualizer
var AD = null;
function draw(ts) {
  var W = C.width = C.offsetWidth, H = C.height = C.offsetHeight;
  var cx = W/2, cy = H/2, br = Math.min(W,H)*0.33;
  if (an && playing) {
    if (!AD) AD = new Uint8Array(an.frequencyBinCount);
    an.getByteFrequencyData(AD);
    var s = 0;
    for (var i = 0; i < AD.length; i++) s += AD[i];
    var raw = s / AD.length / 255 * 0.9;
    en += (raw - en) * 0.12;
    sm += (raw - sm) * 0.03;
  } else {
    var idle = 0.02 + Math.sin(ts*0.0003)*0.007;
    en += (idle - en) * 0.05;
    sm += (idle - sm) * 0.02;
  }
  pts.forEach(function(p) {
    var mot = Math.sin(ts*0.0007+p.p1)*0.11 + Math.sin(ts*0.001+p.p2)*0.07;
    var target = 0.33 + (en + sm*0.4) + mot;
    p.v += (target - p.r) * 0.045;
    p.v *= 0.84;
    p.r = Math.max(0.05, Math.min(1.3, p.r + p.v));
  });
  X.fillStyle = '#dddbd5';
  X.fillRect(0, 0, W, H);
  // grey halos
  [1.28, 1.13].forEach(function(sc, idx) {
    X.beginPath();
    for (var i = 0; i < N; i++) {
      var p = pts[i], pn = pts[(i+1)%N];
      var r = p.r*br*sc, rn = pn.r*br*sc;
      var x = cx+Math.cos(p.a)*r, y = cy+Math.sin(p.a)*r;
      var xn = cx+Math.cos(pn.a)*rn, yn = cy+Math.sin(pn.a)*rn;
      var mx = (x+xn)/2, my = (y+yn)/2;
      if (i===0) X.moveTo(mx,my); else X.quadraticCurveTo(x,y,mx,my);
    }
    X.closePath();
    X.fillStyle = idx===0 ? 'rgba(175,173,169,0.18)' : 'rgba(150,148,144,0.22)';
    X.fill();
  });
  // dark blob
  for (var layer = 3; layer >= 0; layer--) {
    var sc = 1 - layer*0.05;
    X.beginPath();
    for (var i = 0; i < N; i++) {
      var p = pts[i], pn = pts[(i+1)%N];
      var r = p.r*br*sc, rn = pn.r*br*sc;
      var x = cx+Math.cos(p.a)*r, y = cy+Math.sin(p.a)*r;
      var xn = cx+Math.cos(pn.a)*rn, yn = cy+Math.sin(pn.a)*rn;
      var mx = (x+xn)/2, my = (y+yn)/2;
      if (i===0) X.moveTo(mx,my); else X.quadraticCurveTo(x,y,mx,my);
    }
    X.closePath();
    X.fillStyle = layer===0 ? 'rgba(14,14,14,0.97)' : 'rgba(22,22,22,'+(0.04+layer*0.04)+')';
    X.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Soundscape</title><link rel="manifest" href="manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta name="apple-mobile-web-app-title" content="Soundscape"><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}body{background:#e8e6e1;font-family:monospace;display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 14px;min-height:100vh;}#wrap{position:relative;width:min(340px,90vw);height:min(340px,90vw);background:#dddbd5;border:1px solid #c5c2bb;}canvas{display:block;width:100%;height:100%;}#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#dddbd5;z-index:10;}#sb{padding:18px 36px;background:#1a1a1a;color:#e8e6e1;border:none;font-family:monospace;font-size:14px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:2px;}#ml{position:absolute;top:8px;left:10px;font-size:8px;letter-spacing:2px;color:#bbb;text-transform:uppercase;}#rb{position:absolute;bottom:10px;right:10px;width:14px;height:14px;border-radius:50%;background:#a02020;border:1px solid #c03030;cursor:pointer;display:none;}#rt{position:absolute;bottom:10px;right:28px;font-size:8px;color:#bbb;line-height:14px;}.row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;justify-content:center;}.col{display:flex;flex-direction:column;align-items:center;gap:5px;}.col label{font-size:7px;letter-spacing:1px;color:#aaa;text-transform:uppercase;}input[type=range]{writing-mode:vertical-lr;direction:rtl;width:2px;height:55px;accent-color:#888;cursor:pointer;}.btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}.btn{font-size:8px;letter-spacing:1px;color:#888;text-transform:uppercase;cursor:pointer;padding:6px 10px;border:1px solid #c5c2bb;background:#dddbd5;}.tones{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}.tg{display:flex;flex-direction:column;align-items:center;gap:2px;}.tg span{font-size:7px;color:#bbb;}.tv{font-size:7px;color:#999;}.tpair{display:flex;}.tp{width:24px;height:20px;background:#c8c5be;border:1px solid #aaa;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#777;user-select:none;}#hint{font-size:7px;color:#bbb;letter-spacing:1px;text-transform:uppercase;text-align:center;}</style></head><body>
<div id="wrap"><canvas id="c"></canvas><div id="ov"><button id="sb">&#9654;&nbsp;&nbsp;start</button></div><div id="ml">generative</div><div id="rb"></div><div id="rt"></div></div>
<div id="ui" style="display:none;flex-direction:column;align-items:center;gap:12px;width:min(340px,90vw);">
  <div class="tones" id="tones">
    <div class="tg"><div class="tpair"><div class="tp" data-p="treble" data-d="1">1</div><div class="tp" data-p="treble" data-d="-1">2</div></div><span>treble</span><div class="tv" id="tv-treble">0</div></div>
    <div class="tg"><div class="tpair"><div class="tp" data-p="pitch" data-d="1">3</div><div class="tp" data-p="pitch" data-d="-1">4</div></div><span>pitch</span><div class="tv" id="tv-pitch">0</div></div>
    <div class="tg"><div class="tpair"><div class="tp" data-p="strange" data-d="1">5</div><div class="tp" data-p="strange" data-d="-1">6</div></div><span>strange</span><div class="tv" id="tv-strange">0</div></div>
    <div class="tg"><div class="tpair"><div class="tp" data-p="warmth" data-d="1">7</div><div class="tp" data-p="warmth" data-d="-1">8</div></div><span>warmth</span><div class="tv" id="tv-warmth">0</div></div>
    <div class="tg"><div class="tpair"><div class="tp" data-p="density" data-d="1">9</div><div class="tp" data-p="density" data-d="-1">0</div></div><span>density</span><div class="tv" id="tv-density">0</div></div>
  </div>
  <div class="row">
    <div class="col"><input type="range" id="sRev" min="0" max="0.95" step="0.01" value="0.85"><label>reverb</label></div>
    <div class="col"><input type="range" id="sDly" min="0" max="0.9" step="0.01" value="0.4"><label>delay</label></div>
    <div class="col"><input type="range" id="sRate" min="0.1" max="2" step="0.05" value="0.4"><label>rate</label></div>
    <div class="col"><input type="range" id="sChaos" min="0" max="1" step="0.01" value="0.3"><label>chaos</label></div>
    <div class="col"><input type="range" id="sVol" min="0" max="1" step="0.01" value="0.65"><label>vol</label></div>
  </div>
  <div class="btns">
    <div class="btn" id="bPlay">&#9646;&#9646; stop</div>
    <div class="btn" id="bScale">pentatonic</div>
    <div class="btn" id="bTex">sine</div>
    <div class="btn" id="bChord">chord: off</div>
  </div>
  <div id="hint">tap buttons to shape sound</div>
</div>
<script>(function(){
var AC=window.AudioContext||window.webkitAudioContext;
var ac,master,reverb,reverbGain,analyser,eqBass,eqTreble;
var started=false,playing=false,si=0,ti=0,chord=false;
var tp={treble:0,pitch:0,strange:0,warmth:0,density:0};
var timers=[],C=document.getElementById('c'),X=C.getContext('2d');
var N=24,pts=[],en=0,sm=0;
for(var i=0;i<N;i++)pts.push({a:(i/N)*Math.PI*2,r:0.4,v:0,p1:Math.random()*6.28,p2:Math.random()*6.28});

// Each scale spans multiple octaves with actual melodic variety
var SCALES=[
  // pentatonic — low, mid, high register all different notes
  ['C2','E2','G2','B2','D3','E3','G3','B3','D4','E4','G4','B4','D5'],
  // dorian
  ['D2','F2','A2','C3','D3','F3','A3','C4','D4','F4','A4','C5'],
  // lydian
  ['F2','A2','C3','E3','F3','A3','C4','E4','F4','A4','C5','E5'],
  // minor pentatonic
  ['A2','C3','D3','E3','G3','A3','C4','D4','E4','G4','A4','C5'],
  // blues
  ['C2','Eb2','F2','G2','Bb2','C3','Eb3','F3','G3','Bb3','C4','Eb4'],
  // whole tone
  ['C3','D3','E3','F#3','G#3','A#3','C4','D4','E4','F#4','G#4']
];
var SNAMES=['pentatonic','dorian','lydian','minor pent','blues','whole tone'];
var WTYPES=['sine','triangle','sawtooth'];
var WNAMES=['sine','triangle','saw'];

// Separate note pools per register — so layers pick from DIFFERENT octave ranges
function noteHz(note){
  var m=note.match(/([A-G]#?b?)(d)/);if(!m)return 220;
  var ns={C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
  return 440*Math.pow(2,(ns[m[1]]+(+m[2]+1)*12-69)/12);
}

function gp(id){return parseFloat(document.getElementById(id).value);}

// Split scale into low/mid/high register pools
function registers(){
  var sc=SCALES[si];
  var sh=Math.round(tp.pitch/3);
  var low=[],mid=[],high=[];
  sc.forEach(function(n){
    var m=n.match(/([A-G#b]+)(d)/);if(!m)return;
    var oct=+m[2]+sh;
    var note=m[1]+Math.max(1,Math.min(7,oct));
    if(oct<=2)low.push(note);
    else if(oct<=3)mid.push(note);
    else high.push(note);
  });
  if(!low.length)low=mid.slice(0,2);
  if(!high.length)high=mid.slice(-2);
  return {low:low,mid:mid,high:high,all:sc.map(function(n){var m=n.match(/([A-G#b]+)(d)/);if(!m)return n;return m[1]+Math.max(1,Math.min(7,+m[2]+sh));})};
}

function pickFrom(pool,count){
  count=Math.min(pool.length,count||1);
  var res=[],used={},tries=0;
  while(res.length<count&&tries<30){tries++;var i=Math.floor(Math.random()*pool.length);if(!used[i]){used[i]=1;res.push(pool[i]);}}
  return res.length?res:[pool[0]];
}

function makeReverb(secs){
  var len=ac.sampleRate*secs,buf=ac.createBuffer(2,len,ac.sampleRate);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);}
  var conv=ac.createConvolver();conv.buffer=buf;return conv;
}

function buildGraph(){
  master=ac.createGain();master.gain.value=gp('sVol');
  eqBass=ac.createBiquadFilter();eqBass.type='lowshelf';eqBass.frequency.value=250;eqBass.gain.value=2;
  eqTreble=ac.createBiquadFilter();eqTreble.type='highshelf';eqTreble.frequency.value=3500;eqTreble.gain.value=-1;
  reverb=makeReverb(14);
  reverbGain=ac.createGain();reverbGain.gain.value=gp('sRev');
  analyser=ac.createAnalyser();analyser.fftSize=256;
  var dly=ac.createDelay(3);dly.delayTime.value=0.42;
  var dlyFb=ac.createGain();dlyFb.gain.value=0.3;
  dly.connect(dlyFb);dlyFb.connect(dly);
  master.connect(eqBass);eqBass.connect(eqTreble);
  eqTreble.connect(dly);eqTreble.connect(reverb);
  dly.connect(analyser);reverb.connect(reverbGain);reverbGain.connect(analyser);
  analyser.connect(ac.destination);
}

function playNote(freq, dur, vol, type, detune){
  if(!ac||!playing)return;
  var now=ac.currentTime;
  var atk=5+Math.random()*5, rel=14+Math.random()*8;
  if(dur<atk+rel+1)dur=atk+rel+2;
  var g=ac.createGain();
  g.gain.setValueAtTime(0.0001,now);
  g.gain.linearRampToValueAtTime(vol,now+atk);
  g.gain.setValueAtTime(vol,now+dur-rel);
  g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
  // 2-3 slightly detuned oscillators for warmth
  var count=type==='sawtooth'?2:3;
  for(var i=0;i<count;i++){
    var o=ac.createOscillator();
    o.type=type||'sine';
    o.frequency.value=freq;
    o.detune.value=(i===0?0:i===1?+(detune||6):-(detune||6))+Math.random()*3-1.5;
    // micro LFO for gentle shimmer
    var lfo=ac.createOscillator();
    var lfoG=ac.createGain();
    lfo.frequency.value=0.08+Math.random()*0.12;
    lfoG.gain.value=freq*0.004;
    lfo.connect(lfoG);lfoG.connect(o.frequency);
    lfo.start(now);lfo.stop(now+dur);
    o.connect(g);o.start(now);o.stop(now+dur);
    o.onended=function(){try{g.disconnect();}catch(e){}};
  }
  g.connect(master);
}

function schedule(){
  if(!playing)return;
  var r=gp('sRate');
  var interval=(3+(3-r)*6)*1000;
  var reg=registers();
  var cnt=1+Math.max(0,Math.round(tp.density/2));

  // Layer 1: DRONE — picks from MID register, 1-2 notes
  var droneNotes=pickFrom(reg.mid,cnt);
  droneNotes.forEach(function(n){
    playNote(noteHz(n),20+Math.random()*12,0.13,WTYPES[ti],8);
  });

  // Layer 2: SHIMMER — picks from HIGH register independently
  if(Math.random()<0.7){
    setTimeout(function(){
      if(!playing)return;
      var n=pickFrom(reg.high,1)[0];
      playNote(noteHz(n),14+Math.random()*10,0.06,'sine',4);
    },800+Math.random()*1500);
  }

  // Layer 3: SUB — picks from LOW register independently
  if(Math.random()<0.45){
    setTimeout(function(){
      if(!playing)return;
      var n=pickFrom(reg.low,1)[0];
      playNote(noteHz(n),24+Math.random()*14,0.11,'sine',2);
    },1800+Math.random()*2000);
  }

  // Layer 4: PAD — picks 1-2 notes from MID/HIGH, different from drone
  if(Math.random()<0.55){
    setTimeout(function(){
      if(!playing)return;
      var pool=reg.mid.concat(reg.high);
      var n=pickFrom(pool,1+Math.floor(Math.random()*2));
      n.forEach(function(note){
        playNote(noteHz(note),16+Math.random()*10,0.075,'triangle',12);
      });
    },Math.random()*3000);
  }

  // Layer 5: STRANGE accent — picks from ALL registers when strange>0
  if(tp.strange>0&&Math.random()<0.35){
    setTimeout(function(){
      if(!playing)return;
      var n=pickFrom(reg.all,1)[0];
      playNote(noteHz(n),10+Math.random()*8,0.04,Math.random()<0.5?'sine':'triangle',20);
    },Math.random()*4000);
  }

  var t=setTimeout(schedule,interval*(0.7+Math.random()*0.6));
  timers.push(t);
}

function startGen(){timers.forEach(clearTimeout);timers=[];schedule();}
function stopGen(){timers.forEach(clearTimeout);timers=[];}
function setPlay(v){
  playing=v;
  document.getElementById('bPlay').textContent=v?'■■ stop':'▶ play';
  if(v)startGen();else stopGen();
}

document.getElementById('tones').addEventListener('click',function(e){
  var el=e.target;if(!el.classList.contains('tp'))return;
  var p=el.getAttribute('data-p'),d=+el.getAttribute('data-d');
  tp[p]=Math.max(-5,Math.min(5,tp[p]+d));
  document.getElementById('tv-'+p).textContent=tp[p];
  if(eqBass)eqBass.gain.value=2+tp.warmth*1.5;
  if(eqTreble)eqTreble.gain.value=-1+tp.treble*2;
});
document.getElementById('bPlay').addEventListener('click',function(){if(started)setPlay(!playing);});
document.getElementById('bScale').addEventListener('click',function(){si=(si+1)%SCALES.length;document.getElementById('bScale').textContent=SNAMES[si];});
document.getElementById('bTex').addEventListener('click',function(){ti=(ti+1)%WTYPES.length;document.getElementById('bTex').textContent=WNAMES[ti];});
document.getElementById('bChord').addEventListener('click',function(){chord=!chord;document.getElementById('bChord').textContent='chord: '+(chord?'on':'off');});
document.getElementById('sVol').addEventListener('input',function(e){if(master)master.gain.value=+e.target.value;});
document.getElementById('sRev').addEventListener('input',function(e){if(reverbGain)reverbGain.gain.value=+e.target.value;});
document.getElementById('sRate').addEventListener('input',function(){if(playing){stopGen();startGen();}});

// Record
var recOn=false,recChunks=[],mediaRec=null,recSec=0,recTmr=null;
document.getElementById('rb').addEventListener('click',function(){
  if(!started)return;
  var rb=document.getElementById('rb'),rt=document.getElementById('rt');
  if(!recOn){
    var dest=ac.createMediaStreamDestination();
    analyser.connect(dest);recChunks=[];recSec=0;
    mediaRec=new MediaRecorder(dest.stream);
    mediaRec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
    mediaRec.onstop=function(){var blob=new Blob(recChunks,{type:'audio/webm'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='soundscape-'+Date.now()+'.webm';document.body.appendChild(a);a.click();document.body.removeChild(a);};
    mediaRec.start();recOn=true;rb.style.background='#e03030';
    recTmr=setInterval(function(){recSec++;rt.textContent=recSec+'s';},1000);
  } else {
    clearInterval(recTmr);rt.textContent='';mediaRec.stop();recOn=false;rb.style.background='#a02020';
  }
});

// iOS-safe start
document.getElementById('sb').addEventListener('click',function(){
  if(started)return;
  ac=new AC();
  var buf=ac.createBuffer(1,1,ac.sampleRate);
  var src=ac.createBufferSource();src.buffer=buf;src.connect(ac.destination);src.start(0);
  buildGraph();
  started=true;playing=true;
  startGen();
  document.getElementById('ov').style.display='none';
  document.getElementById('ui').style.display='flex';
  document.getElementById('rb').style.display='block';
  document.getElementById('bPlay').textContent='■■ stop';
});

// BLOB
var AD=null;
function draw(ts){
  var W=C.width=C.offsetWidth,H=C.height=C.offsetHeight,cx=W/2,cy=H/2,br=Math.min(W,H)*0.33;
  if(analyser&&playing){
    if(!AD)AD=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(AD);
    var s=0;for(var i=0;i<AD.length;i++)s+=AD[i];
    var raw=s/AD.length/255*0.9;en+=(raw-en)*0.12;sm+=(raw-sm)*0.03;
  } else {
    var idle=0.02+Math.sin(ts*0.0003)*0.007;
    en+=(idle-en)*0.05;sm+=(idle-sm)*0.02;
  }
  pts.forEach(function(p){
    var mot=Math.sin(ts*0.0007+p.p1)*0.11+Math.sin(ts*0.001+p.p2)*0.07;
    var target=0.33+(en+sm*0.4)+mot;
    p.v+=(target-p.r)*0.045;p.v*=0.84;p.r=Math.max(0.05,Math.min(1.3,p.r+p.v));
  });
  X.fillStyle='#dddbd5';X.fillRect(0,0,W,H);
  [1.28,1.13].forEach(function(scale,idx){
    X.beginPath();
    for(var i=0;i<N;i++){var p=pts[i],pn=pts[(i+1)%N];var r=p.r*br*scale,rn=pn.r*br*scale;var x=cx+Math.cos(p.a)*r,y=cy+Math.sin(p.a)*r;var xn=cx+Math.cos(pn.a)*rn,yn=cy+Math.sin(pn.a)*rn;var mx=(x+xn)/2,my=(y+yn)/2;if(i===0)X.moveTo(mx,my);else X.quadraticCurveTo(x,y,mx,my);}
    X.closePath();X.fillStyle=idx===0?'rgba(175,173,169,0.18)':'rgba(150,148,144,0.22)';X.fill();
  });
  for(var layer=3;layer>=0;layer--){
    var sc=1-layer*0.05;
    X.beginPath();
    for(var i=0;i<N;i++){var p=pts[i],pn=pts[(i+1)%N];var r=p.r*br*sc,rn=pn.r*br*sc;var x=cx+Math.cos(p.a)*r,y=cy+Math.sin(p.a)*r;var xn=cx+Math.cos(pn.a)*rn,yn=cy+Math.sin(pn.a)*rn;var mx=(x+xn)/2,my=(y+yn)/2;if(i===0)X.moveTo(mx,my);else X.quadraticCurveTo(x,y,mx,my);}
    X.closePath();X.fillStyle=layer===0?'rgba(14,14,14,0.97)':'rgba(22,22,22,'+(0.04+layer*0.04)+')';X.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
})();</script></body></html>

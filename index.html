<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Soundscape</title><link rel="manifest" href="manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta name="apple-mobile-web-app-title" content="Soundscape"><link rel="apple-touch-icon" href="icon.png"><script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script><script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#e8e6e1;font-family:monospace;display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px;min-height:100vh;}#wrap{position:relative;width:340px;height:340px;background:#dddbd5;border:1px solid #c5c2bb;}canvas{display:block;width:100%;height:100%;}#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#dddbd5;}#sb{padding:14px 28px;background:#1a1a1a;color:#e8e6e1;border:none;font-family:monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;}#sb:hover{background:#333;}#ml{position:absolute;top:8px;left:10px;font-size:8px;letter-spacing:2px;color:#bbb;text-transform:uppercase;}#rb{position:absolute;bottom:10px;right:10px;width:14px;height:14px;border-radius:50%;background:#a02020;border:1px solid #c03030;cursor:pointer;display:none;}#rt{position:absolute;bottom:10px;right:28px;font-size:8px;color:#bbb;line-height:14px;}.row{display:flex;gap:18px;align-items:flex-end;}.col{display:flex;flex-direction:column;align-items:center;gap:5px;}.col label{font-size:7px;letter-spacing:1px;color:#aaa;text-transform:uppercase;}input[type=range]{writing-mode:vertical-lr;direction:rtl;width:2px;height:55px;accent-color:#888;cursor:pointer;}.btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}.btn{font-size:8px;letter-spacing:1px;color:#888;text-transform:uppercase;cursor:pointer;padding:4px 8px;border:1px solid #c5c2bb;background:#dddbd5;}.tones{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}.tg{display:flex;flex-direction:column;align-items:center;gap:2px;}.tg span{font-size:7px;color:#bbb;}.tv{font-size:7px;color:#999;}.tpair{display:flex;}.tp{width:20px;height:16px;background:#c8c5be;border:1px solid #aaa;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#777;user-select:none;}#hint{font-size:7px;color:#bbb;letter-spacing:1px;text-transform:uppercase;}</style></head><body><div id="wrap"><canvas id="c"></canvas><div id="ov"><button id="sb">&#9654;&nbsp;start</button></div><div id="ml">generative</div><div id="rb"></div><div id="rt"></div></div><div id="ui" style="display:none;flex-direction:column;align-items:center;gap:12px;width:340px;"><div class="tones" id="tones"><div class="tg"><div class="tpair"><div class="tp" data-p="treble" data-d="1">1</div><div class="tp" data-p="treble" data-d="-1">2</div></div><span>treble</span><div class="tv" id="tv-treble">0</div></div><div class="tg"><div class="tpair"><div class="tp" data-p="pitch" data-d="1">3</div><div class="tp" data-p="pitch" data-d="-1">4</div></div><span>pitch</span><div class="tv" id="tv-pitch">0</div></div><div class="tg"><div class="tpair"><div class="tp" data-p="strange" data-d="1">5</div><div class="tp" data-p="strange" data-d="-1">6</div></div><span>strange</span><div class="tv" id="tv-strange">0</div></div><div class="tg"><div class="tpair"><div class="tp" data-p="warmth" data-d="1">7</div><div class="tp" data-p="warmth" data-d="-1">8</div></div><span>warmth</span><div class="tv" id="tv-warmth">0</div></div><div class="tg"><div class="tpair"><div class="tp" data-p="density" data-d="1">9</div><div class="tp" data-p="density" data-d="-1">0</div></div><span>density</span><div class="tv" id="tv-density">0</div></div></div><div class="row"><div class="col"><input type="range" id="sRev" min="0" max="1" step="0.01" value="0.85"><label>reverb</label></div><div class="col"><input type="range" id="sDly" min="0" max="0.9" step="0.01" value="0.45"><label>delay</label></div><div class="col"><input type="range" id="sRate" min="0.1" max="2" step="0.05" value="0.35"><label>rate</label></div><div class="col"><input type="range" id="sChaos" min="0" max="1" step="0.01" value="0.3"><label>chaos</label></div><div class="col"><input type="range" id="sVol" min="-36" max="0" step="1" value="-8"><label>vol</label></div></div><div class="btns"><div class="btn" id="bPlay">&#9646;&#9646; stop</div><div class="btn" id="bMode">mode: gen</div><div class="btn" id="bScale">pentatonic</div><div class="btn" id="bTex">sine</div><div class="btn" id="bChord">chord: off</div></div><div id="hint">space=mode &middot; tab=scale &middot; t=texture &middot; c=chord &middot; p=stop</div></div><script>(function(){var C=document.getElementById('c'),X=C.getContext('2d');var started=false,playing=false,mode='gen',chord=false;var recOn=false,mp3enc=null,mp3buf=[],scriptProc=null,recSec=0,recTmr=null;var L1=null,L2=null,L3=null,L4=null;var AN=null,AD=null,en=0,sm=0,si=0,ti=0;var tp={treble:0,pitch:0,strange:0,warmth:0,density:0};var N=24,pts=[];for(var i=0;i<N;i++)pts.push({a:(i/N)*Math.PI*2,r:0.4,v:0,p1:Math.random()*6.28,p2:Math.random()*6.28});var SCALES=[{n:'pentatonic',notes:['C2','G2','C3','E3','G3','B3','D4','G4','B4']},{n:'dorian',notes:['D2','A2','D3','F3','A3','C4','D4','F4','A4']},{n:'lydian',notes:['F2','C3','F3','A3','C4','E4','G4','A4','C5']},{n:'minor pent',notes:['A2','E3','A3','C4','D4','E4','G4','A4']},{n:'blues',notes:['C2','G2','C3','Eb3','F3','G3','Bb3','C4']},{n:'whole tone',notes:['C3','D3','E3','F#3','G#3','A#3','C4']}];var CHORDS=[[0],[0,4],[0,4,7],[0,3,7],[0,4,7,11],[0,3,7,10],[0,5,7]];var TEXTURES=['sine','fatsine','fatsawtooth','triangle','pulse'];var KEYS={a:'C4',s:'D4',d:'E4',f:'G4',g:'A4',h:'C5',j:'D5',k:'E5',l:'G5'};var held={};var rev,dly,cho,eq,vol,drone,shim,sub,pad,keys;function gp(id){return parseFloat(document.getElementById(id).value);}function pool(){var sc=SCALES[si].notes.slice();var sh=Math.round(tp.pitch/3);if(sh===0)return sc;return sc.map(function(n){var m=n.match(/([A-G#b]+)(d)/);return m?m[1]+Math.max(1,Math.min(7,+m[2]+sh)):n;});}function pick(){var p=pool();if(chord){var ri=Math.floor(Math.random()*p.length),root=p[ri],mm=root.match(/([A-G#b]+)(d)/);if(!mm)return[root];var ro=+mm[2];var ci=Math.min(CHORDS.length-1,1+Math.floor(Math.abs(tp.density)*0.5));var ct=CHORDS[Math.floor(Math.random()*ci)];var allN=SCALES[si].notes.map(function(n){return n.replace(/d/,'');});return ct.map(function(s){var ni=(ri+s)%allN.length,eo=Math.floor((ri+s)/allN.length);return allN[ni]+(ro+eo);});}var cnt=Math.max(1,1+Math.max(0,Math.round(tp.density/2))+Math.floor(Math.random()*2));cnt=Math.min(p.length,cnt);var res=[],used={},tries=0;while(res.length<cnt&&tries<30){tries++;var idx=Math.floor(Math.random()*p.length);if(!used[idx]){used[idx]=1;res.push(p[idx]);}}return res.length?res:[p[0]];}function buildAudio(){vol=new Tone.Volume(gp('sVol')).toDestination();rev=new Tone.Reverb({decay:14,wet:gp('sRev')}).connect(vol);dly=new Tone.FeedbackDelay('2n',gp('sDly')).connect(rev);cho=new Tone.Chorus(0.6,5,0.7).connect(dly);cho.start();eq=new Tone.EQ3(0,0,0).connect(cho);drone=new Tone.PolySynth(Tone.Synth,{oscillator:{type:TEXTURES[ti]},envelope:{attack:8,decay:4,sustain:0.95,release:22},maxPolyphony:6}).connect(eq);drone.volume.value=-4;shim=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'fatsine',count:4,spread:25},envelope:{attack:11,decay:4,sustain:0.8,release:20},maxPolyphony:4}).connect(eq);shim.volume.value=-13;sub=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:13,decay:5,sustain:0.97,release:28},maxPolyphony:3}).connect(eq);sub.volume.value=-17;pad=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'fatsawtooth',count:3,spread:18},envelope:{attack:7,decay:3,sustain:0.9,release:18},maxPolyphony:4}).connect(eq);pad.volume.value=-15;keys=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle'},envelope:{attack:1.5,decay:1,sustain:0.9,release:10},maxPolyphony:8}).connect(eq);AN=Tone.getContext().createAnalyser();AN.fftSize=256;AD=new Uint8Array(AN.frequencyBinCount);Tone.getDestination().connect(AN);}function applyEQ(){if(!eq)return;eq.high.value=tp.treble*2;eq.low.value=tp.warmth*2;eq.mid.value=tp.strange*1.5;}function startLoops(){if(L1)return;var r=gp('sRate'),i1=Math.max(2,4+(3-r)*7);L1=new Tone.Loop(function(t){drone.triggerAttackRelease(pick(),(14+Math.random()*10).toFixed(1),t);},i1);L2=new Tone.Loop(function(t){if(Math.random()<0.65){var p=pool(),n=Math.min(p.length,1+Math.floor(Math.random()*2)),notes=[],u={};while(notes.length<n){var x=Math.floor(Math.random()*p.length);if(!u[x]){u[x]=1;notes.push(p[x]);}}shim.triggerAttackRelease(notes,(10+Math.random()*10).toFixed(1),t+Math.random()*2);}},i1*1.7);L3=new Tone.Loop(function(t){if(Math.random()<0.5){var p=pool(),note=p[Math.floor(Math.random()*p.length)],mm=note.match(/([A-G#b]+)(d)/);if(mm)sub.triggerAttackRelease([mm[1]+Math.max(1,+mm[2]-2)],(18+Math.random()*12).toFixed(1),t+3);}},i1*2.8);L4=new Tone.Loop(function(t){if(Math.random()<0.55)pad.triggerAttackRelease(pick(),(12+Math.random()*8).toFixed(1),t+Math.random()*3);},i1*0.85);[L1,L2,L3,L4].forEach(function(l){l.start(0);});Tone.Transport.start();}function stopLoops(){[L1,L2,L3,L4].forEach(function(l){if(l){l.stop();l.dispose();}});L1=L2=L3=L4=null;Tone.Transport.stop();}function setPlay(v){playing=v;document.getElementById('bPlay').textContent=v?'■■ stop':'▶ play';if(v){if(mode==='gen')startLoops();}else{stopLoops();[drone,shim,sub,pad].forEach(function(s){if(s)s.releaseAll();});}}function setMode(m){mode=m;document.getElementById('ml').textContent=m;document.getElementById('bMode').textContent='mode: '+m;if(playing){stopLoops();if(m==='gen')startLoops();}}function adjTone(p,d){tp[p]=Math.max(-5,Math.min(5,tp[p]+d));document.getElementById('tv-'+p).textContent=tp[p];applyEQ();}document.getElementById('tones').addEventListener('click',function(e){var el=e.target;if(!el.classList.contains('tp'))return;adjTone(el.getAttribute('data-p'),+el.getAttribute('data-d'));});document.getElementById('bPlay').addEventListener('click',function(){if(started)setPlay(!playing);});document.getElementById('bMode').addEventListener('click',function(){setMode(mode==='gen'?'synth':'gen');});document.getElementById('bScale').addEventListener('click',function(){si=(si+1)%SCALES.length;document.getElementById('bScale').textContent=SCALES[si].n;});document.getElementById('bTex').addEventListener('click',function(){ti=(ti+1)%TEXTURES.length;document.getElementById('bTex').textContent=TEXTURES[ti];if(started&&drone)drone.set({oscillator:{type:TEXTURES[ti]}});});document.getElementById('bChord').addEventListener('click',function(){chord=!chord;document.getElementById('bChord').textContent='chord: '+(chord?'on':'off');});document.getElementById('sRev').addEventListener('input',function(e){if(rev)rev.wet.value=+e.target.value;});document.getElementById('sDly').addEventListener('input',function(e){if(dly)dly.wet.value=+e.target.value;});document.getElementById('sVol').addEventListener('input',function(e){if(vol)vol.volume.value=+e.target.value;});document.getElementById('sRate').addEventListener('input',function(){if(playing&&mode==='gen'){stopLoops();startLoops();}});document.getElementById('rb').addEventListener('click',function(){if(!started)return;var rb=document.getElementById('rb'),rt=document.getElementById('rt');var ctx=Tone.getContext().rawContext;if(!recOn){mp3buf=[];mp3enc=new lamejs.Mp3Encoder(1,ctx.sampleRate,128);scriptProc=ctx.createScriptProcessor(4096,1,1);Tone.getDestination().connect(scriptProc);scriptProc.connect(ctx.destination);scriptProc.onaudioprocess=function(e){if(!recOn)return;var samples=e.inputBuffer.getChannelData(0);var s16=new Int16Array(samples.length);for(var i=0;i<samples.length;i++)s16[i]=Math.max(-32768,Math.min(32767,samples[i]*32767));var enc=mp3enc.encodeBuffer(s16);if(enc.length>0)mp3buf.push(new Int8Array(enc));};recOn=true;recSec=0;rb.style.background='#e03030';recTmr=setInterval(function(){recSec++;rt.textContent=recSec+'s';},1000);}else{recOn=false;clearInterval(recTmr);rt.textContent='';var fin=mp3enc.flush();if(fin.length>0)mp3buf.push(new Int8Array(fin));scriptProc.disconnect();scriptProc=null;var blob=new Blob(mp3buf,{type:'audio/mp3'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='soundscape-'+Date.now()+'.mp3';document.body.appendChild(a);a.click();document.body.removeChild(a);rb.style.background='#a02020';mp3buf=[];mp3enc=null;}});var numKeys={'1':['treble',1],'2':['treble',-1],'3':['pitch',1],'4':['pitch',-1],'5':['strange',1],'6':['strange',-1],'7':['warmth',1],'8':['warmth',-1],'9':['density',1],'0':['density',-1]};document.addEventListener('keydown',function(e){if(e.repeat||!started)return;if(e.code==='Space'){e.preventDefault();setMode(mode==='gen'?'synth':'gen');return;}if(e.code==='Tab'){e.preventDefault();si=(si+1)%SCALES.length;document.getElementById('bScale').textContent=SCALES[si].n;return;}if(e.key==='t'||e.key==='T'){ti=(ti+1)%TEXTURES.length;document.getElementById('bTex').textContent=TEXTURES[ti];if(drone)drone.set({oscillator:{type:TEXTURES[ti]}});return;}if(e.key==='c'||e.key==='C'){chord=!chord;document.getElementById('bChord').textContent='chord: '+(chord?'on':'off');return;}if(e.key==='p'||e.key==='P'){setPlay(!playing);return;}if(numKeys[e.key]){adjTone(numKeys[e.key][0],numKeys[e.key][1]);return;}if(mode==='synth'&&playing){var note=KEYS[e.key];if(note&&!held[note]){held[note]=1;keys.triggerAttack(note);}}});document.addEventListener('keyup',function(e){if(mode==='synth'){var note=KEYS[e.key];if(note){delete held[note];keys.triggerRelease(note);}}});document.getElementById('sb').addEventListener('click',function(){Tone.context.resume().then(function(){Tone.start().then(function(){buildAudio();started=true;setPlay(true);document.getElementById('ov').style.display='none';document.getElementById('ui').style.display='flex';document.getElementById('rb').style.display='block';}).catch(function(err){document.getElementById('sb').textContent='err: '+err.message;});});});
// BLOB DRAW — now with extra grey halo ring
function draw(ts){
  var W=C.width=C.offsetWidth,H=C.height=C.offsetHeight,cx=W/2,cy=H/2,br=Math.min(W,H)*0.33;
  if(AN&&AD&&playing){AN.getByteFrequencyData(AD);var s=0;for(var i=0;i<AD.length;i++)s+=AD[i];var raw=s/AD.length/255*0.9;en+=(raw-en)*0.12;sm+=(raw-sm)*0.03;}else{var idle=0.02+Math.sin(ts*0.0003)*0.007;en+=(idle-en)*0.05;sm+=(idle-sm)*0.02;}
  pts.forEach(function(p){var mot=Math.sin(ts*0.0007+p.p1)*0.11+Math.sin(ts*0.001+p.p2)*0.07;var target=0.33+(en+sm*0.4)+mot;p.v+=(target-p.r)*0.045;p.v*=0.84;p.r=Math.max(0.05,Math.min(1.3,p.r+p.v));});
  X.fillStyle='#dddbd5';X.fillRect(0,0,W,H);

  // Layer 1: outermost grey halo — slightly larger than blob, soft and diffuse
  X.beginPath();
  for(var i=0;i<N;i++){var p=pts[i],pn=pts[(i+1)%N];var r=p.r*br*1.28,rn=pn.r*br*1.28;var x=cx+Math.cos(p.a)*r,y=cy+Math.sin(p.a)*r;var xn=cx+Math.cos(pn.a)*rn,yn=cy+Math.sin(pn.a)*rn;var mx=(x+xn)/2,my=(y+yn)/2;if(i===0)X.moveTo(mx,my);else X.quadraticCurveTo(x,y,mx,my);}
  X.closePath();
  X.fillStyle='rgba(180,178,174,0.18)';X.fill();

  // Layer 2: mid grey ring — closer to the blob
  X.beginPath();
  for(var i=0;i<N;i++){var p=pts[i],pn=pts[(i+1)%N];var r=p.r*br*1.13,rn=pn.r*br*1.13;var x=cx+Math.cos(p.a)*r,y=cy+Math.sin(p.a)*r;var xn=cx+Math.cos(pn.a)*rn,yn=cy+Math.sin(pn.a)*rn;var mx=(x+xn)/2,my=(y+yn)/2;if(i===0)X.moveTo(mx,my);else X.quadraticCurveTo(x,y,mx,my);}
  X.closePath();
  X.fillStyle='rgba(155,153,149,0.22)';X.fill();

  // Layers 3-6: the dark blob itself, layered for depth
  for(var layer=3;layer>=0;layer--){
    var sc=1-layer*0.05;
    X.beginPath();
    for(var i=0;i<N;i++){var p=pts[i],pn=pts[(i+1)%N];var r=p.r*br*sc,rn=pn.r*br*sc;var x=cx+Math.cos(p.a)*r,y=cy+Math.sin(p.a)*r;var xn=cx+Math.cos(pn.a)*rn,yn=cy+Math.sin(pn.a)*rn;var mx=(x+xn)/2,my=(y+yn)/2;if(i===0)X.moveTo(mx,my);else X.quadraticCurveTo(x,y,mx,my);}
    X.closePath();
    X.fillStyle=layer===0?'rgba(14,14,14,0.97)':'rgba(22,22,22,'+(0.04+layer*0.04)+')';
    X.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);})();</script></body></html>

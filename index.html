<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Soundscape</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e8e6e1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;gap:14px;padding:20px;}
#wrap{position:relative;width:360px;height:360px;background:#dddbd5;border:1px solid #c8c5be;flex-shrink:0;}
canvas{width:100%;height:100%;display:block;}
#startscreen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#dddbd5;z-index:20;}
#startbtn{padding:16px 36px;background:#1a1a1a;color:#e8e6e1;font-family:monospace;font-size:13px;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;}
#startmsg{font-size:9px;color:#bbb;letter-spacing:2px;text-transform:uppercase;}
#ml{position:absolute;top:10px;left:12px;font-size:9px;letter-spacing:2px;color:#aaa;text-transform:uppercase;z-index:5;}
#rb{position:absolute;bottom:12px;right:12px;width:16px;height:16px;border-radius:50%;background:#c0392b;border:1.5px solid #e74c3c;cursor:pointer;z-index:10;}
#rtime{position:absolute;bottom:12px;right:34px;font-size:9px;color:#bbb;line-height:16px;}
#dlabel{position:absolute;bottom:12px;left:12px;font-size:8px;color:#bbb;text-transform:uppercase;}
.tk{width:22px;height:18px;background:#c8c5be;border:1px solid #b5b2ab;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;user-select:none;}
.btn{font-size:8px;letter-spacing:2px;color:#aaa;text-transform:uppercase;cursor:pointer;padding:5px 10px;border:1px solid #c8c5be;background:#dddbd5;user-select:none;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="startscreen">
    <button id="startbtn">&#9654; start</button>
    <div id="startmsg">klik om te beginnen</div>
  </div>
  <div id="ml">generative</div>
  <div id="rb"></div>
  <div id="rtime"></div>
  <div id="dlabel"></div>
</div>

<div id="ctrl" style="display:none;flex-direction:column;align-items:center;gap:10px;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <div style="font-size:8px;color:#aaa;letter-spacing:1px;text-transform:uppercase;width:100%;text-align:center;">tone shape</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-treble-up" style="border-radius:3px 0 0 3px;">1</div><div class="tk" id="tk-treble-dn" style="border-left:none;border-radius:0 3px 3px 0;">2</div></div><div style="font-size:7px;color:#bbb;">treble</div><div id="tv-treble" style="font-size:8px;color:#999;">0</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-pitch-up" style="border-radius:3px 0 0 3px;">3</div><div class="tk" id="tk-pitch-dn" style="border-left:none;border-radius:0 3px 3px 0;">4</div></div><div style="font-size:7px;color:#bbb;">pitch</div><div id="tv-pitch" style="font-size:8px;color:#999;">0</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-strange-up" style="border-radius:3px 0 0 3px;">5</div><div class="tk" id="tk-strange-dn" style="border-left:none;border-radius:0 3px 3px 0;">6</div></div><div style="font-size:7px;color:#bbb;">strange</div><div id="tv-strange" style="font-size:8px;color:#999;">0</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-warmth-up" style="border-radius:3px 0 0 3px;">7</div><div class="tk" id="tk-warmth-dn" style="border-left:none;border-radius:0 3px 3px 0;">8</div></div><div style="font-size:7px;color:#bbb;">warmth</div><div id="tv-warmth" style="font-size:8px;color:#999;">0</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-density-up" style="border-radius:3px 0 0 3px;">9</div><div class="tk" id="tk-density-dn" style="border-left:none;border-radius:0 3px 3px 0;">0</div></div><div style="font-size:7px;color:#bbb;">density</div><div id="tv-density" style="font-size:8px;color:#999;">0</div></div>
    </div>
  </div>
  <div style="display:flex;gap:20px;align-items:flex-end;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sReverb" min="0" max="1" step="0.01" value="0.75" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">reverb</label></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sDelay" min="0" max="0.85" step="0.01" value="0.3" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">delay</label></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sRate" min="0.1" max="2" step="0.05" value="0.5" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">rate</label></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sChaos" min="0" max="1" step="0.01" value="0.35" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">chaos</label></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sVol" min="-36" max="0" step="1" value="-10" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">vol</label></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
    <div id="playbtn" class="btn">&#9654; play</div>
    <div id="modebtn" class="btn">mode: generative</div>
    <div id="scalebtn" class="btn">pentatonic</div>
    <div id="texturebtn" class="btn">sine</div>
    <div id="chordbtn" class="btn">chord: off</div>
  </div>
  <div style="font-size:8px;color:#bbb;letter-spacing:1px;text-transform:uppercase;">space=mode &middot; tab=scale &middot; t=texture &middot; c=chord &middot; p=play/stop</div>
</div>

<script>
var canvas=document.getElementById('c');
var ctx2=canvas.getContext('2d');
var started=false, playing=false, mode='generative', chordMode=false;
var isRec=false, mediaRec=null, recChunks=[], recSecs=0, recTimer=null;
var loop1=null,loop2=null,loop3=null,loop4=null;
var analyser,aData,energy=0,smoothE=0,scaleIdx=0,textureIdx=0;
var toneP={treble:0,pitch:0,strange:0,warmth:0,density:0};
var N=28;
var pts=[];
for(var i=0;i<N;i++){
  pts.push({angle:(i/N)*Math.PI*2,r:0.4,vr:0,p1:Math.random()*Math.PI*2,p2:Math.random()*Math.PI*2});
}

var scaleData=[
  {name:'pentatonic',notes:['C','E','G','B','D'],octaves:[3,3,3,3,4]},
  {name:'dorian',notes:['D','E','F','A','C','D','F','A'],octaves:[3,3,3,3,4,4,4,4]},
  {name:'lydian',notes:['F','G','A','C','E','G','A','C'],octaves:[3,3,3,4,4,4,4,5]},
  {name:'minor pent',notes:['A','C','D','E','G','A','C','D'],octaves:[3,4,4,4,4,4,5,5]},
  {name:'blues',notes:['C','Eb','F','F#','G','Bb'],octaves:[3,3,3,3,3,3]},
  {name:'whole tone',notes:['C','D','E','F#','G#','A#'],octaves:[3,3,3,3,3,3]},
];
var chordTypes=[[0],[0,4],[0,4,7],[0,3,7],[0,4,7,11],[0,3,7,10]];
var textures=[
  {name:'sine',type:'sine'},{name:'fat sine',type:'fatsine'},
  {name:'saw',type:'fatsawtooth'},{name:'triangle',type:'triangle'},
];
var keyNotes={a:'C4',s:'D4',d:'E4',f:'G4',g:'A4',h:'C5',j:'D5',k:'E5',l:'G5'};
var held={};
var rev,dly,cho,eq,lfo,volNode,droneSynth,shimmer,subDrone,keySynth;

function gp(id){return parseFloat(document.getElementById(id).value);}
function getScaleNotes(){var sd=scaleData[scaleIdx];return sd.notes.map(function(n,i){return n+sd.octaves[i];});}

function pickNotes(){
  var pool=getScaleNotes();
  var octShift=Math.round(toneP.pitch/3);
  var chaos=gp('sChaos');
  if(chordMode){
    var ri=Math.floor(Math.random()*pool.length);
    var rs=pool[ri];
    var m=rs.match(/([A-G#b]+)(d)/);
    if(!m)return[rs];
    var rOct=parseInt(m[2])+octShift;
    var allN=scaleData[scaleIdx].notes;
    var ci=Math.min(chordTypes.length-1,1+Math.floor(Math.abs(toneP.density)*0.5));
    return chordTypes[Math.floor(Math.random()*ci)].map(function(s){
      var ni=(ri+s)%allN.length;
      var eo=Math.floor((ri+s)/allN.length);
      return allN[ni%allN.length]+(rOct+eo);
    });
  }
  var bc=1+Math.max(0,Math.round(toneP.density/2));
  var n=Math.min(pool.length,Math.max(1,bc+Math.floor(Math.random()*2)));
  var chosen=[],used={};
  var tries=0;
  while(chosen.length<n&&tries<20){
    tries++;
    var idx=Math.floor(Math.random()*pool.length);
    if(!used[idx]){
      used[idx]=true;
      var s=pool[idx];
      var mm=s.match(/([A-G#b]+)(d)/);
      if(mm){
        var note=mm[1];
        var oct=Math.max(2,Math.min(6,parseInt(mm[2])+octShift));
        chosen.push(note+oct);
      }
    }
  }
  return chosen.length?chosen:[pool[0]];
}

function buildAudio(){
  volNode=new Tone.Volume(gp('sVol')).toDestination();
  rev=new Tone.Reverb({decay:7,wet:0.7}).connect(volNode);
  dly=new Tone.FeedbackDelay('8n.',0.3).connect(rev);
  cho=new Tone.Chorus(1.5,3,0.5).connect(dly);
  cho.start();
  lfo=new Tone.AutoFilter({frequency:'8m',depth:0.3}).connect(cho);
  lfo.start();
  eq=new Tone.EQ3({low:0,mid:0,high:0}).connect(lfo);

  droneSynth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'sine'},
    envelope:{attack:3,decay:1,sustain:0.8,release:6},
    maxPolyphony:6
  }).connect(eq);
  droneSynth.volume.value=-4;

  shimmer=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'fatsine',count:3,spread:20},
    envelope:{attack:5,decay:2,sustain:0.5,release:8},
    maxPolyphony:4
  }).connect(eq);
  shimmer.volume.value=-18;

  subDrone=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'sine'},
    envelope:{attack:6,decay:2,sustain:0.9,release:8},
    maxPolyphony:3
  }).connect(eq);
  subDrone.volume.value=-24;

  keySynth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'triangle'},
    envelope:{attack:0.3,decay:0.3,sustain:0.8,release:3},
    maxPolyphony:8
  }).connect(eq);

  analyser=Tone.getContext().createAnalyser();
  analyser.fftSize=256;
  aData=new Uint8Array(analyser.frequencyBinCount);
  Tone.getDestination().connect(analyser);
}

function applyTone(){
  if(!eq)return;
  eq.high.value=toneP.treble*2;
  eq.low.value=toneP.warmth*2;
  eq.mid.value=toneP.strange*1.5;
  var dl=document.getElementById('dlabel');
  if(dl){var v=1+Math.max(0,Math.round(toneP.density/2));dl.textContent=chordMode?'chord':v+'v';}
}

function startGen(){
  if(loop1)return;
  var r=gp('sRate');
  var i1=Math.max(1,1+(2.1-r)*4);
  loop1=new Tone.Loop(function(t){
    droneSynth.triggerAttackRelease(pickNotes(),(3+Math.random()*4).toFixed(1),t);
  },i1);
  loop2=new Tone.Loop(function(t){
    if(Math.random()<0.5){
      var p=getScaleNotes();
      var n=Math.min(p.length,1+Math.floor(Math.random()*2));
      var notes=[];var u={};
      while(notes.length<n){var idx=Math.floor(Math.random()*p.length);if(!u[idx]){u[idx]=true;notes.push(p[idx]);}}
      shimmer.triggerAttackRelease(notes,(2+Math.random()*4).toFixed(1),t);
    }
  },i1*1.7);
  loop3=new Tone.Loop(function(t){
    if(Math.random()<0.3){
      var p=getScaleNotes();
      var note=p[Math.floor(Math.random()*p.length)];
      var mm=note.match(/([A-G#b]+)(d)/);
      if(mm)subDrone.triggerAttackRelease([mm[1]+Math.max(1,parseInt(mm[2])-2)],(4+Math.random()*5).toFixed(1),t+1);
    }
  },i1*2.5);
  [loop1,loop2,loop3].forEach(function(l){l.start(0);});
  Tone.Transport.start();
}

function stopGen(){
  [loop1,loop2,loop3].forEach(function(l){if(l){l.stop();l.dispose();}});
  loop1=loop2=loop3=null;
  Tone.Transport.stop();
}

function setPlaying(val){
  playing=val;
  var btn=document.getElementById('playbtn');
  if(playing){
    btn.textContent='■ stop';
    if(mode==='generative')startGen();
  } else {
    btn.textContent='▶ play';
    stopGen();
    [droneSynth,shimmer,subDrone].forEach(function(s){if(s)s.releaseAll();});
  }
}

function setMode(m){
  mode=m;
  document.getElementById('ml').textContent=m;
  document.getElementById('modebtn').textContent='mode: '+m;
  if(playing){stopGen();if(m==='generative')startGen();}
}

function toggleChord(){
  chordMode=!chordMode;
  document.getElementById('chordbtn').textContent='chord: '+(chordMode?'on':'off');
  applyTone();
}
function nextScale(){scaleIdx=(scaleIdx+1)%scaleData.length;document.getElementById('scalebtn').textContent=scaleData[scaleIdx].name;}
function nextTexture(){
  textureIdx=(textureIdx+1)%textures.length;
  document.getElementById('texturebtn').textContent=textures[textureIdx].name;
  if(started&&droneSynth)droneSynth.set({oscillator:{type:textures[textureIdx].type}});
}
function adjustTone(param,dir){
  toneP[param]=Math.max(-5,Math.min(5,toneP[param]+(dir==='up'?1:-1)));
  document.getElementById('tv-'+param).textContent=toneP[param];
  applyTone();
}

document.querySelectorAll('.tk').forEach(function(el){
  el.addEventListener('click',function(e){
    e.stopPropagation();
    var p=el.id.split('-');
    adjustTone(p[1],p[2]);
  });
});

// THE FIX: pure synchronous start using .then() chains, no async/await
function doStart(){
  if(started){setPlaying(!playing);return;}
  document.getElementById('startmsg').textContent='starting...';
  Tone.context.resume().then(function(){
    return Tone.start();
  }).then(function(){
    buildAudio();
    applyTone();
    started=true;
    setPlaying(true);
    document.getElementById('startscreen').style.display='none';
    document.getElementById('ctrl').style.display='flex';
    document.getElementById('rb').style.display='block';
  }).catch(function(e){
    document.getElementById('startmsg').textContent='error: '+e.message;
  });
}

document.getElementById('startbtn').onclick=doStart;
document.getElementById('startscreen').onclick=doStart;
document.getElementById('playbtn').addEventListener('click',function(e){e.stopPropagation();if(started)setPlaying(!playing);});
document.getElementById('modebtn').addEventListener('click',function(e){e.stopPropagation();setMode(mode==='generative'?'synth':'generative');});
document.getElementById('scalebtn').addEventListener('click',function(e){e.stopPropagation();nextScale();});
document.getElementById('texturebtn').addEventListener('click',function(e){e.stopPropagation();nextTexture();});
document.getElementById('chordbtn').addEventListener('click',function(e){e.stopPropagation();toggleChord();});
document.getElementById('sReverb').addEventListener('input',function(e){if(rev)rev.wet.value=+e.target.value;});
document.getElementById('sDelay').addEventListener('input',function(e){if(dly)dly.wet.value=+e.target.value;});
document.getElementById('sVol').addEventListener('input',function(e){if(volNode)volNode.volume.value=+e.target.value;});
document.getElementById('sRate').addEventListener('input',function(){if(mode==='generative'&&playing){stopGen();startGen();}});

document.getElementById('rb').addEventListener('click',function(e){
  e.stopPropagation();if(!started)return;
  var btn=document.getElementById('rb'),rt=document.getElementById('rtime');
  if(!isRec){
    var dest=Tone.getContext().createMediaStreamDestination();
    Tone.getDestination().connect(dest);recChunks=[];recSecs=0;
    mediaRec=new MediaRecorder(dest.stream);
    mediaRec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
    mediaRec.onstop=function(){
      var blob=new Blob(recChunks,{type:'audio/webm'});
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='soundscape-'+Date.now()+'.webm';
      a.click();
    };
    mediaRec.start();isRec=true;
    btn.style.background='#e74c3c';
    recTimer=setInterval(function(){recSecs++;rt.textContent=recSecs+'s';},1000);
  } else {
    clearInterval(recTimer);rt.textContent='';
    mediaRec.stop();isRec=false;btn.style.background='#c0392b';
  }
});

var numMap={'1':['treble','up'],'2':['treble','dn'],'3':['pitch','up'],'4':['pitch','dn'],
            '5':['strange','up'],'6':['strange','dn'],'7':['warmth','up'],'8':['warmth','dn'],
            '9':['density','up'],'0':['density','dn']};

document.addEventListener('keydown',function(e){
  if(e.repeat||!started)return;
  if(e.code==='Space'){e.preventDefault();setMode(mode==='generative'?'synth':'generative');return;}
  if(e.code==='Tab'){e.preventDefault();nextScale();return;}
  if(e.key.toLowerCase()==='t'){nextTexture();return;}
  if(e.key.toLowerCase()==='c'){toggleChord();return;}
  if(e.key.toLowerCase()==='p'){setPlaying(!playing);return;}
  if(numMap[e.key]){adjustTone(numMap[e.key][0],numMap[e.key][1]);return;}
  if(mode==='synth'&&playing){
    var note=keyNotes[e.key.toLowerCase()];
    if(note&&!held[note]){held[note]=true;keySynth&&keySynth.triggerAttack(note);}
  }
});
document.addEventListener('keyup',function(e){
  if(mode==='synth'){
    var note=keyNotes[e.key.toLowerCase()];
    if(note){delete held[note];keySynth&&keySynth.triggerRelease(note);}
  }
});

function draw(ts){
  var W=canvas.width=canvas.offsetWidth,H=canvas.height=canvas.offsetHeight;
  var cx=W/2,cy=H/2,baseR=Math.min(W,H)*0.34;
  if(analyser&&aData&&playing){
    analyser.getByteFrequencyData(aData);
    var sum=0;for(var i=0;i<aData.length;i++)sum+=aData[i];
    var raw=sum/aData.length/255*0.8;
    energy+=(raw-energy)*0.1;smoothE+=(raw-smoothE)*0.025;
  } else {
    var idle=0.02+Math.sin(ts*0.0003)*0.008;
    energy+=(idle-energy)*0.04;smoothE+=(idle-smoothE)*0.015;
  }
  pts.forEach(function(p,i){
    var motion=Math.sin(ts*0.0007+p.p1)*0.12+Math.sin(ts*0.0011+p.p2)*0.08;
    var target=0.35+(energy+smoothE*0.5)+motion;
    p.vr+=(target-p.r)*0.04;p.vr*=0.85;
    p.r=Math.max(0.05,Math.min(1.3,p.r+p.vr));
  });
  ctx2.fillStyle='#dddbd5';ctx2.fillRect(0,0,W,H);
  for(var layer=3;layer>=0;layer--){
    var sc=1-layer*0.05;
    ctx2.beginPath();
    for(var i=0;i<N;i++){
      var p=pts[i],pn=pts[(i+1)%N];
      var r=p.r*baseR*sc,rn=pn.r*baseR*sc;
      var x=cx+Math.cos(p.angle)*r,y=cy+Math.sin(p.angle)*r;
      var xn=cx+Math.cos(pn.angle)*rn,yn=cy+Math.sin(pn.angle)*rn;
      var cpx=(x+xn)/2,cpy=(y+yn)/2;
      if(i===0)ctx2.moveTo(cpx,cpy);else ctx2.quadraticCurveTo(x,y,cpx,cpy);
    }
    ctx2.closePath();
    ctx2.fillStyle=layer===0?'rgba(12,12,12,0.96)':'rgba(20,20,20,'+(0.04+layer*0.04)+')';
    ctx2.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>

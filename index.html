<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Soundscape</title><script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#e8e6e1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;gap:14px;padding:20px;}#wrap{position:relative;width:360px;height:360px;background:#dddbd5;border:1px solid #c8c5be;cursor:pointer;flex-shrink:0;}canvas{width:100%;height:100%;display:block;}#ml{position:absolute;top:10px;left:12px;font-size:9px;letter-spacing:2px;color:#aaa;text-transform:uppercase;}#sm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;letter-spacing:2px;color:#bbb;text-transform:uppercase;text-align:center;pointer-events:none;}#rb{position:absolute;bottom:12px;right:12px;width:16px;height:16px;border-radius:50%;background:#c0392b;border:1.5px solid #e74c3c;cursor:pointer;z-index:10;}#rtime{position:absolute;bottom:12px;right:34px;font-size:9px;color:#bbb;line-height:16px;}#dlabel{position:absolute;bottom:12px;left:12px;font-size:8px;color:#bbb;text-transform:uppercase;}.tk{width:22px;height:18px;background:#c8c5be;border:1px solid #b5b2ab;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;user-select:none;}.btn{font-size:8px;letter-spacing:2px;color:#aaa;text-transform:uppercase;cursor:pointer;padding:4px 8px;border:1px solid #c8c5be;background:#dddbd5;user-select:none;}</style></head><body><div id="wrap"><canvas id="c"></canvas><div id="ml">generative</div><div id="sm">klik om te starten</div><div id="rb"></div><div id="rtime"></div><div id="dlabel"></div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;"><div style="font-size:8px;color:#aaa;letter-spacing:1px;text-transform:uppercase;width:100%;text-align:center;">tone shape</div><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-treble-up" style="border-radius:3px 0 0 3px;">1</div><div class="tk" id="tk-treble-dn" style="border-left:none;border-radius:0 3px 3px 0;">2</div></div><div style="font-size:7px;color:#bbb;">treble</div><div id="tv-treble" style="font-size:8px;color:#999;">0</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-pitch-up" style="border-radius:3px 0 0 3px;">3</div><div class="tk" id="tk-pitch-dn" style="border-left:none;border-radius:0 3px 3px 0;">4</div></div><div style="font-size:7px;color:#bbb;">pitch</div><div id="tv-pitch" style="font-size:8px;color:#999;">0</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-strange-up" style="border-radius:3px 0 0 3px;">5</div><div class="tk" id="tk-strange-dn" style="border-left:none;border-radius:0 3px 3px 0;">6</div></div><div style="font-size:7px;color:#bbb;">strange</div><div id="tv-strange" style="font-size:8px;color:#999;">0</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-warmth-up" style="border-radius:3px 0 0 3px;">7</div><div class="tk" id="tk-warmth-dn" style="border-left:none;border-radius:0 3px 3px 0;">8</div></div><div style="font-size:7px;color:#bbb;">warmth</div><div id="tv-warmth" style="font-size:8px;color:#999;">0</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="display:flex;"><div class="tk" id="tk-density-up" style="border-radius:3px 0 0 3px;">9</div><div class="tk" id="tk-density-dn" style="border-left:none;border-radius:0 3px 3px 0;">0</div></div><div style="font-size:7px;color:#bbb;">density</div><div id="tv-density" style="font-size:8px;color:#999;">0</div></div></div></div><div style="display:flex;gap:20px;align-items:flex-end;"><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sReverb" min="0" max="1" step="0.01" value="0.75" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;cursor:pointer;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">reverb</label></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sDelay" min="0" max="0.85" step="0.01" value="0.3" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;cursor:pointer;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">delay</label></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sRate" min="0.1" max="2" step="0.05" value="0.5" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;cursor:pointer;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">rate</label></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sChaos" min="0" max="1" step="0.01" value="0.35" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;cursor:pointer;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">chaos</label></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><input type="range" id="sVol" min="-36" max="0" step="1" value="-10" style="writing-mode:vertical-lr;direction:rtl;height:60px;width:2px;accent-color:#999;cursor:pointer;"><label style="font-size:8px;color:#aaa;text-transform:uppercase;">vol</label></div></div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;"><div id="playbtn" class="btn" style="border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;">&#9654;</div><div id="modebtn" class="btn">mode: generative</div><div id="scalebtn" class="btn">pentatonic</div><div id="texturebtn" class="btn">sine</div><div id="chordbtn" class="btn">chord: off</div></div><div style="font-size:8px;color:#bbb;letter-spacing:1px;text-transform:uppercase;">space=mode &middot; tab=scale &middot; t=texture &middot; c=chord &middot; p=play</div><script>const canvas=document.getElementById('c'),ctx2=canvas.getContext('2d');let started=false,playing=false,mode='generative',chordMode=false,isRec=false,mediaRec=null,recChunks=[],recSecs=0,recTimer=null,loop1=null,loop2=null,loop3=null,loop4=null,analyser,aData,energy=0,smoothE=0,scaleIdx=0,textureIdx=0;const toneP={treble:0,pitch:0,strange:0,warmth:0,density:0};const N=44;const pts=Array.from({length:N},(_,i)=>({angle:(i/N)*Math.PI*2,r:0.4,vr:0,p1:Math.random()*Math.PI*2,p2:Math.random()*Math.PI*2,p3:Math.random()*Math.PI*2}));const scaleData=[{name:'pentatonic',notes:['C','E','G','B','D'],octaves:[3,3,3,3,4]},{name:'dorian',notes:['D','E','F','A','C','D','F','A'],octaves:[3,3,3,3,4,4,4,4]},{name:'lydian',notes:['F','G','A','C','E','G','A','C'],octaves:[3,3,3,4,4,4,4,5]},{name:'minor pent',notes:['A','C','D','E','G','A','C','D'],octaves:[3,4,4,4,4,4,5,5]},{name:'blues',notes:['C','Eb','F','F#','G','Bb'],octaves:[3,3,3,3,3,3]},{name:'whole tone',notes:['C','D','E','F#','G#','A#'],octaves:[3,3,3,3,3,3]}];const chordTypes=[[0],[0,4],[0,4,7],[0,3,7],[0,4,7,11],[0,3,7,10],[0,5,7],[0,2,7]];const textures=[{name:'sine',type:'sine'},{name:'fat sine',type:'fatsine'},{name:'saw',type:'fatsawtooth'},{name:'square',type:'fatsquare'},{name:'triangle',type:'triangle'},{name:'pulse',type:'pulse'}];const keyNotes={a:'C4',s:'D4',d:'E4',f:'G4',g:'A4',h:'C5',j:'D5',k:'E5',l:'G5'};const held=new Set();let rev,dly,cho,eq,pitchShift,lfo,volNode,droneSynth,shimmer,subDrone,padSynth,keySynth;function gp(id){return parseFloat(document.getElementById(id).value);}function getScaleNotes(){const sd=scaleData[scaleIdx];return sd.notes.map((n,i)=>n+sd.octaves[i]);}function pickNotes(){const pool=getScaleNotes(),octShift=Math.round(toneP.pitch/3),chaos=gp('sChaos');if(chordMode){const ri=Math.floor(Math.random()*pool.length),rs=pool[ri],m=rs.match(/([A-G#b]+)(d)/);if(!m)return[rs];const rOct=parseInt(m[2])+octShift,allN=scaleData[scaleIdx].notes;const ci=Math.min(chordTypes.length-1,1+Math.floor(Math.abs(toneP.density)*0.6)+(toneP.density>0?1:0));return chordTypes[Math.floor(Math.random()*ci)].map(s=>{const ni=(ri+s)%allN.length,eo=Math.floor((ri+s)/allN.length);return allN[ni%allN.length]+(rOct+eo);});}const bc=1+Math.max(0,Math.round(toneP.density/2)),n=Math.min(pool.length,Math.max(1,bc+Math.floor(Math.random()*2)));const chosen=[],used=new Set();while(chosen.length<n){const idx=Math.floor(Math.random()*pool.length);if(!used.has(idx)){used.add(idx);const s=pool[idx],m=s.match(/([A-G#b]+)(d)/);if(m){const note=m[1],oct=Math.max(2,Math.min(6,parseInt(m[2])+octShift));chosen.push((chaos>0.6&&Math.random()<0.2)?['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'][Math.floor(Math.random()*12)]+oct:note+oct);}}}return chosen;}function buildAudio(){volNode=new Tone.Volume(-10).toDestination();rev=new Tone.Reverb({decay:8,wet:0.75}).connect(volNode);dly=new Tone.FeedbackDelay('8n.',0.35).connect(rev);eq=new Tone.EQ3({low:0,mid:0,high:0}).connect(dly);pitchShift=new Tone.PitchShift(0).connect(eq);cho=new Tone.Chorus(1.5,3.5,0.5).connect(pitchShift);cho.start();lfo=new Tone.AutoFilter({frequency:'8m',depth:0.3}).connect(cho);lfo.start();droneSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:textures[textureIdx].type},envelope:{attack:4,decay:1.5,sustain:0.8,release:7},maxPolyphony:8}).connect(lfo);droneSynth.volume.value=-4;shimmer=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'fatsine',count:4,spread:25},envelope:{attack:6,decay:2,sustain:0.4,release:9},maxPolyphony:6}).connect(lfo);shimmer.volume.value=-20;subDrone=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:8,decay:3,sustain:0.9,release:10},maxPolyphony:4}).connect(lfo);subDrone.volume.value=-26;padSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'fatsawtooth',count:3,spread:20},envelope:{attack:5,decay:2,sustain:0.6,release:8},maxPolyphony:6}).connect(lfo);padSynth.volume.value=-18;keySynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle'},envelope:{attack:0.4,decay:0.3,sustain:0.8,release:4},maxPolyphony:10}).connect(lfo);analyser=Tone.getContext().createAnalyser();analyser.fftSize=512;aData=new Uint8Array(analyser.frequencyBinCount);Tone.getDestination().connect(analyser);}function applyTone(){if(!eq)return;eq.high.value=toneP.treble*2.4;eq.low.value=toneP.warmth*2;eq.mid.value=toneP.strange*1.5;if(pitchShift)pitchShift.pitch=toneP.pitch*2;if(cho)cho.depth=Math.max(0,Math.min(1,0.5+toneP.strange*0.08));const dl=document.getElementById('dlabel');if(dl){const v=1+Math.max(0,Math.round(toneP.density/2));dl.textContent=chordMode?'chord':v+'v';}}function startGen(){const r=gp('sRate'),i1=1+(2.1-r)*4;loop1=new Tone.Loop(t=>{droneSynth.triggerAttackRelease(pickNotes(),(3+Math.random()*5).toFixed(1),t);},i1);loop2=new Tone.Loop(t=>{if(Math.random()<0.5){const p=getScaleNotes(),n=Math.min(p.length,1+Math.floor(Math.random()*2)),notes=[],u=new Set();while(notes.length<n){const i=Math.floor(Math.random()*p.length);if(!u.has(i)){u.add(i);notes.push(p[i]);}}shimmer.triggerAttackRelease(notes,(2+Math.random()*4).toFixed(1),t);}},i1*1.7);loop3=new Tone.Loop(t=>{if(Math.random()<0.35){const p=getScaleNotes(),note=p[Math.floor(Math.random()*p.length)],m=note.match(/([A-G#b]+)(d)/);if(m)subDrone.triggerAttackRelease([m[1]+Math.max(1,parseInt(m[2])-2)],(5+Math.random()*6).toFixed(1),t+1);}},i1*2.8);loop4=new Tone.Loop(t=>{if(toneP.density>=1&&Math.random()<0.4)padSynth.triggerAttackRelease(pickNotes(),(4+Math.random()*5).toFixed(1),t+Math.random());},i1*0.8);[loop1,loop2,loop3,loop4].forEach(l=>l.start(0));Tone.Transport.start();}function stopGen(){[loop1,loop2,loop3,loop4].forEach(l=>{if(l){l.stop();l.dispose();}});loop1=loop2=loop3=loop4=null;Tone.Transport.stop();}function setPlaying(val){playing=val;const btn=document.getElementById('playbtn');if(playing){btn.textContent='■';document.getElementById('sm').style.display='none';if(mode==='generative')startGen();}else{btn.textContent='▶';stopGen();[droneSynth,shimmer,subDrone,padSynth].forEach(s=>{if(s)s.releaseAll();});}}function setMode(m){mode=m;document.getElementById('ml').textContent=m;document.getElementById('modebtn').textContent='mode: '+m;if(playing){stopGen();if(m==='generative')startGen();}}function toggleChord(){chordMode=!chordMode;document.getElementById('chordbtn').textContent='chord: '+(chordMode?'on':'off');applyTone();}function nextScale(){scaleIdx=(scaleIdx+1)%scaleData.length;document.getElementById('scalebtn').textContent=scaleData[scaleIdx].name;}function nextTexture(){textureIdx=(textureIdx+1)%textures.length;document.getElementById('texturebtn').textContent=textures[textureIdx].name;if(started&&droneSynth){droneSynth.releaseAll();droneSynth.set({oscillator:{type:textures[textureIdx].type}});}}function adjustTone(param,dir){toneP[param]=Math.max(-5,Math.min(5,toneP[param]+(dir==='up'?1:-1)));document.getElementById('tv-'+param).textContent=toneP[param];applyTone();}document.querySelectorAll('.tk').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();const p=el.id.split('-');adjustTone(p[1],p[2]);});});async function startApp(){if(started){setPlaying(!playing);return;}await Tone.start();buildAudio();started=true;applyTone();setPlaying(true);}document.getElementById('wrap').addEventListener('click',startApp);document.getElementById('playbtn').addEventListener('click',e=>{e.stopPropagation();startApp();});document.getElementById('modebtn').addEventListener('click',e=>{e.stopPropagation();setMode(mode==='generative'?'synth':'generative');});document.getElementById('scalebtn').addEventListener('click',e=>{e.stopPropagation();nextScale();});document.getElementById('texturebtn').addEventListener('click',e=>{e.stopPropagation();nextTexture();});document.getElementById('chordbtn').addEventListener('click',e=>{e.stopPropagation();toggleChord();});document.getElementById('sReverb').addEventListener('input',e=>{if(rev)rev.wet.value=+e.target.value;});document.getElementById('sDelay').addEventListener('input',e=>{if(dly)dly.wet.value=+e.target.value;});document.getElementById('sVol').addEventListener('input',e=>{if(volNode)volNode.volume.value=+e.target.value;});document.getElementById('sRate').addEventListener('input',()=>{if(mode==='generative'&&playing){stopGen();startGen();}});document.getElementById('rb').addEventListener('click',async e=>{e.stopPropagation();if(!started)return;const btn=document.getElementById('rb'),rt=document.getElementById('rtime');if(!isRec){const dest=Tone.getContext().createMediaStreamDestination();Tone.getDestination().connect(dest);recChunks=[];recSecs=0;mediaRec=new MediaRecorder(dest.stream);mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};mediaRec.onstop=()=>{const blob=new Blob(recChunks,{type:'audio/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='soundscape-'+Date.now()+'.webm';a.click();};mediaRec.start();isRec=true;btn.style.background='#e74c3c';recTimer=setInterval(()=>{recSecs++;rt.textContent=recSecs+'s';},1000);}else{clearInterval(recTimer);rt.textContent='';mediaRec.stop();isRec=false;btn.style.background='#c0392b';}});const numMap={'1':['treble','up'],'2':['treble','dn'],'3':['pitch','up'],'4':['pitch','dn'],'5':['strange','up'],'6':['strange','dn'],'7':['warmth','up'],'8':['warmth','dn'],'9':['density','up'],'0':['density','dn']};document.addEventListener('keydown',async e=>{if(e.repeat)return;if(!started){await startApp();return;}if(e.code==='Space'){e.preventDefault();setMode(mode==='generative'?'synth':'generative');return;}if(e.code==='Tab'){e.preventDefault();nextScale();return;}if(e.key.toLowerCase()==='t'){nextTexture();return;}if(e.key.toLowerCase()==='c'){toggleChord();return;}if(e.key.toLowerCase()==='p'){setPlaying(!playing);return;}if(numMap[e.key]){adjustTone(...numMap[e.key]);return;}if(mode==='synth'&&playing){const note=keyNotes[e.key.toLowerCase()];if(note&&!held.has(note)){held.add(note);keySynth&&keySynth.triggerAttack(note);}}});document.addEventListener('keyup',e=>{if(mode==='synth'){const note=keyNotes[e.key.toLowerCase()];if(note){held.delete(note);keySynth&&keySynth.triggerRelease(note);}}});function draw(ts){const W=canvas.width=canvas.offsetWidth,H=canvas.height=canvas.offsetHeight,cx=W/2,cy=H/2,baseR=Math.min(W,H)*0.34;if(analyser&&aData&&playing){analyser.getByteFrequencyData(aData);const be=Math.floor(aData.length*0.08),me=Math.floor(aData.length*0.4);let b=0,m=0,t=0;for(let i=0;i<be;i++)b+=aData[i];for(let i=be;i<me;i++)m+=aData[i];for(let i=me;i<aData.length;i++)t+=aData[i];const raw=(b/be+m/(me-be)*0.6+t/(aData.length-me)*0.4)/255*0.6;energy+=(raw-energy)*0.1;smoothE+=(raw-smoothE)*0.025;}else{const idle=0.025+Math.sin(ts*0.0003)*0.01;energy+=(idle-energy)*0.04;smoothE+=(idle-smoothE)*0.015;}pts.forEach((p,i)=>{const band=i/N,motion=Math.sin(ts*0.0007+p.p1)*0.13+Math.sin(ts*0.0013+p.p2)*0.09+Math.sin(ts*0.0004+p.p3+band*Math.PI*2)*0.05,sw=toneP.strange!==0?Math.sin(ts*0.002+i*0.7)*toneP.strange*0.015:0,target=0.35+(energy+smoothE*0.5)+motion+sw;p.vr+=(target-p.r)*0.05;p.vr*=0.84;p.r=Math.max(0.05,Math.min(1.35,p.r+p.vr));});ctx2.fillStyle='#dddbd5';ctx2.fillRect(0,0,W,H);for(let layer=3;layer>=0;layer--){const sc=1-layer*0.045;ctx2.beginPath();for(let i=0;i<N;i++){const p=pts[i],pn=pts[(i+1)%N],r=p.r*baseR*sc,rn=pn.r*baseR*sc,x=cx+Math.cos(p.angle)*r,y=cy+Math.sin(p.angle)*r,xn=cx+Math.cos(pn.angle)*rn,yn=cy+Math.sin(pn.angle)*rn,cpx=(x+xn)/2,cpy=(y+yn)/2;i===0?ctx2.moveTo(cpx,cpy):ctx2.quadraticCurveTo(x,y,cpx,cpy);}ctx2.closePath();ctx2.fillStyle=layer===0?'rgba(10,10,10,0.97)':'rgba(20,20,20,'+(0.06+layer*0.05)+')';ctx2.fill();}const grd=ctx2.createRadialGradient(cx,cy,baseR*0.7,cx,cy,baseR*1.05);grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(200,198,194,'+(energy*0.3+0.05)+')');ctx2.fillStyle=grd;ctx2.fillRect(0,0,W,H);requestAnimationFrame(draw);}requestAnimationFrame(draw);</script></body></html>
